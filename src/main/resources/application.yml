spring:
  profiles:
    active: ${APP_ROLE:both}
  cloud:
    azure:
      servicebus:
        enabled: ${SERVICEBUS_ENABLED:false}
        connection-string: ${SERVICEBUS_CONNECTION_STRING:}
        entity-type: topic

app:
  role: ${APP_ROLE:both}
  cosmos:
    uri: ${COSMOS_ENDPOINT:}
    key: ${COSMOS_KEY:}
    database: ${COSMOS_DATABASE:ordermanagement}
    orders-container: ${COSMOS_ORDERS_CONTAINER:orders}
    leases-container: ${COSMOS_LEASES_CONTAINER:leases}
  outbox:
    changefeed:
      processor-name: outbox-dispatcher
      instance-name: ${HOSTNAME:local-instance}
      feed-poll-delay: 1s
      max-items-per-batch: 100
  servicebus:
    publisher:
      topic-name: ${SERVICEBUS_TOPIC:order-events}
      enabled: ${SERVICEBUS_PUBLISHER_ENABLED:false}
    consumer:
      enabled: ${SERVICEBUS_CONSUMER_ENABLED:false}
      topic-name: ${SERVICEBUS_TOPIC:order-events}
      subscription-name: ${SERVICEBUS_SUBSCRIPTION:demo-consumer}

logging:
  level:
    com.azure: WARN

---
spring:
  config:
    activate:
      on-profile: worker
  main:
    web-application-type: none
